name: Migration CI

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'Lab4.Data/**'
      - 'Lab4.Tests/**'

jobs:
  validate-migrations:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Check for pending model changes
        run: dotnet ef migrations has-pending-model-changes --project Lab4.Data --startup-project Lab4.Data
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=test_db;Username=postgres;Password=postgres_password"

      - name: Apply migrations
        run: dotnet ef database update --project Lab4.Data --startup-project Lab4.Data
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=test_db;Username=postgres;Password=postgres_password"

      - name: Generate idempotent SQL script
        run: dotnet ef migrations script --idempotent --project Lab4.Data --startup-project Lab4.Data --output migrations.sql

      - name: Upload migration script
        uses: actions/upload-artifact@v4
        with:
          name: migration-sql
          path: migrations.sql