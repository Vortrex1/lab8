name: Branch Name Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-branch-name:
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch name
        run: |
          BRANCH_NAME="${{ github.head_ref }}"

          # Define allowed branch name patterns
          if [[ "$BRANCH_NAME" =~ ^(feature|bugfix|hotfix|chore|fix|release)/[a-z0-9-]+(-[a-z0-9-]+)*$ ]] || [[ "$BRANCH_NAME" == "main" ]] || [[ "$BRANCH_NAME" == "master" ]]; then
            echo "✅ Branch name '$BRANCH_NAME' follows the naming convention"
          else
            echo "⚠️ Branch name '$BRANCH_NAME' does not follow the strict convention"
            echo "  This check is informational only and will not fail the workflow."
            echo "  Recommended patterns: feature/, bugfix/, hotfix/, chore/, fix/, release/"
            echo "  Example: feature/add-login, fix/auth-bug, release/v1.0.0"
          fi