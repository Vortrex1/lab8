name: K6 Smoke Tests

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - 'Lab4.Data/**'
      - 'Lab4.Tests/**'
      - 'Lab4.Tests.Performance/**'
  workflow_dispatch:

jobs:
  k6-smoke-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Restore
        run: dotnet restore Lab4.sln

      - name: Build
        run: dotnet build Lab4.sln --configuration Release --no-restore

      - name: Start API
        env:
          ASPNETCORE_URLS: http://localhost:5000
          ASPNETCORE_ENVIRONMENT: Development
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=test_db;Username=postgres;Password=postgres_password"
        run: dotnet run --project Lab4.Data/Lab4.Data.csproj --configuration Release --no-build &
        working-directory: .

      - name: Wait for API readiness
        run: |
          echo "Waiting for API to become ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/api/student > /dev/null 2>&1; then
              echo "API is ready!"
              exit 0
            fi
            echo "  attempt $i/30..."
            sleep 2
          done
          echo "API failed to become ready"
          exit 1

      - name: Run k6 smoke test
        working-directory: Lab4.Tests.Performance
        run: k6 run -e BASE_URL=http://localhost:5000 scripts/smoke-test.js --summary-export=results.json

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-smoke-results
          path: Lab4.Tests.Performance/results.json